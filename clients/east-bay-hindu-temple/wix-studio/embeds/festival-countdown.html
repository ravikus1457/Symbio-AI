<!doctype html>
<!--
  East Bay Hindu Temple — FESTIVAL COUNTDOWN banner embed for Wix Studio
  Wix Studio → Add (+) → Embed Code → "Embed HTML" → paste this file.
  Suggested size: full width, height ~150px, scrollbars OFF.
  Update the FESTIVALS list each year (keep it in date order); the banner
  always points at the next upcoming festival automatically.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Mukta:wght@500;700&family=Tiro+Devanagari+Hindi&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      /* Red base so the banner never shows a white gap if the embed is mis-sized. */
      html, body { margin: 0; height: 100%; background: #5e0a13; }
      .band {
        height: 100%; min-height: 130px; display: flex; align-items: center; justify-content: center;
        gap: clamp(1rem, 4vw, 3rem); flex-wrap: wrap; text-align: center; padding: 1.2rem;
        font-family: "Mukta", system-ui, sans-serif; color: #fdeccd;
        background: linear-gradient(135deg, #7c0f1c 0%, #5e0a13 100%);
        border-top: 3px solid #c89b3c; border-bottom: 3px solid #c89b3c;
      }
      .num { font-family: "Cormorant Garamond", serif; font-weight: 700; line-height: 1; color: #f1cf7a; }
      .num b { font-size: clamp(2.6rem, 7vw, 3.6rem); display: block; }
      .num span { font-size: .8rem; letter-spacing: .16em; text-transform: uppercase; color: rgba(253,236,205,.78); }
      .info { text-align: left; }
      .info .lbl { font-size: .8rem; letter-spacing: .16em; text-transform: uppercase; color: #f1cf7a; font-weight: 700; }
      .info h3 { font-family: "Cormorant Garamond", serif; font-size: clamp(1.5rem, 4vw, 2.2rem); margin: .15rem 0; color: #fff; }
      .info .deva { font-family: "Tiro Devanagari Hindi", serif; color: rgba(253,236,205,.85); }
      .today { font-family: "Cormorant Garamond", serif; font-size: clamp(1.6rem, 4vw, 2.2rem); color: #f1cf7a; }
    </style>
  </head>
  <body>
    <div class="band" data-band>
      <div class="num"><b data-days>—</b><span data-unit>days</span></div>
      <div class="info">
        <div class="lbl">Next Celebration</div>
        <h3 data-name>—</h3>
        <div class="deva" data-deva></div>
      </div>
    </div>
    <script>
      (function () {
        // [year, monthIndex(0-11), day]. Keep in date order. Confirm dates each year.
        var FESTIVALS = [
          { name: "Maha Shivaratri", deva: "महाशिवरात्रि", date: [2026,1,15] },
          { name: "Holi", deva: "होली", date: [2026,2,3] },
          { name: "Ram Navami", deva: "राम नवमी", date: [2026,2,26] },
          { name: "Hanuman Jayanti", deva: "हनुमान जयंती", date: [2026,3,2] },
          { name: "Krishna Janmashtami", deva: "जन्माष्टमी", date: [2026,8,4] },
          { name: "Ganesh Chaturthi", deva: "गणेश चतुर्थी", date: [2026,8,14] },
          { name: "Sharad Navratri", deva: "नवरात्रि", date: [2026,9,11] },
          { name: "Diwali", deva: "दीपावली", date: [2026,10,8] }
        ];
        var today = new Date(); today.setHours(0,0,0,0);
        var next = null;
        for (var i=0;i<FESTIVALS.length;i++){ var f=FESTIVALS[i];
          var d=new Date(f.date[0],f.date[1],f.date[2]);
          if (d>=today){ next={f:f,d:d}; break; } }
        if(!next) return;
        var days = Math.round((next.d - today)/86400000);
        document.querySelector("[data-name]").textContent = next.f.name;
        document.querySelector("[data-deva]").textContent = next.f.deva;
        if (days === 0) {
          document.querySelector(".num").innerHTML = '<span class="today">Today 🪔</span>';
        } else {
          document.querySelector("[data-days]").textContent = days;
          document.querySelector("[data-unit]").textContent = days === 1 ? "day" : "days";
        }
      })();
    </script>
  </body>
</html>
