# Cloudflare Worker config for the instant-teardown API.
# Deploy: cd infra/worker && npx wrangler deploy
name = "symbio-scan"
main = "worker.mjs"
compatibility_date = "2024-09-23"

# The Worker bundles tools/lib/scan-core.mjs from the repo root at deploy time.
# Optional vars (set non-secret ones here, secrets via `wrangler secret put`):
# [vars]
# ALLOWED_ORIGIN = "https://symbioai.dev"
# LEAD_FROM = "Symbio AI <ravi@trysymbioai.com>"
# PHYSICAL_ADDRESS = "Symbio AI, 1234 Telegraph Ave Ste 100, Oakland, CA 94612"
#
# Secrets (never commit):
#   npx wrangler secret put RESEND_API_KEY      # optional speed-to-lead auto-reply
#   npx wrangler secret put LEAD_BCC             # optional founder copy
#   npx wrangler secret put TELEGRAM_BOT_TOKEN   # instant Telegram lead pings
#   npx wrangler secret put TELEGRAM_CHAT_ID     # the chat/group to notify
